<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="50%" style="stop-color:#4E342E"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
  </defs>
  <!-- Leather background -->
  <rect width="32" height="32" rx="4" fill="url(#leather)"/>
  <!-- Fisherman silhouette -->
  <g fill="#2D1810" transform="translate(6, 4)">
    <!-- Hat -->
    <ellipse cx="10" cy="3" rx="4" ry="1.5"/>
    <rect x="7" y="2" width="6" height="2" rx="0.5"/>
    <!-- Head -->
    <circle cx="10" cy="5" r="2"/>
    <!-- Body -->
    <path d="M8 7 L12 7 L13 15 L7 15 Z"/>
    <!-- Legs -->
    <path d="M7 15 L6 22 L8 22 L9 15"/>
    <path d="M11 15 L12 22 L14 22 L13 15"/>
    <!-- Fishing rod -->
    <path d="M13 8 Q18 4 20 2" stroke="#2D1810" stroke-width="0.8" fill="none"/>
    <!-- Arm holding rod -->
    <path d="M12 9 L14 8" stroke="#2D1810" stroke-width="1.5"/>
    <!-- Fish on line -->
    <ellipse cx="19" cy="6" rx="2" ry="1" transform="rotate(30 19 6)"/>
    <!-- Fish tail -->
    <path d="M17 6 L15.5 5 L15.5 7 Z"/>
  </g>
</svg>